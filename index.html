<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Anime Vault"/>
<meta name="theme-color" content="#050510"/>
<title>Anime Vault ⛩</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#e11d48;--rd:#be123c;--gold:#f59e0b;
  --bg:#050510;--c1:#0f0f1a;--c2:#1a1a2e;
  --bdr:#1e293b;--mt:#4b5563;--sb:#374151;
}
html,body{min-height:100%;background:var(--bg);color:#fff;font-family:'Rajdhani',sans-serif}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

/* ── HEADER ── */
#hdr{position:sticky;top:0;z-index:100;background:linear-gradient(90deg,#0d0d1a,#1a0020,#0d0d1a);border-bottom:1px solid var(--red);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 30px rgba(225,29,72,.2);padding-top:max(11px,calc(env(safe-area-inset-top)+7px))}
.logo{display:flex;align-items:center;gap:8px}
.logo h1{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;background:linear-gradient(90deg,#fff,#f43f5e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.1em}
.sv{text-align:center}
.sv .n{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;line-height:1}
.sv .l{font-size:8px;letter-spacing:.1em;color:var(--mt);margin-top:1px}
#add-btn{background:linear-gradient(90deg,var(--red),var(--rd));border:none;border-radius:7px;padding:7px 13px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 3px 12px rgba(225,29,72,.5)}

/* ── MAIN ── */
#main{max-width:1400px;margin:0 auto;padding:13px 12px 40px}

/* ── PROGRESS ── */
.pb-w{margin-bottom:13px}
.pb-l{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px}
.pb{height:4px;background:var(--bdr);border-radius:2px;overflow:hidden}
.pb-f{height:100%;background:linear-gradient(90deg,var(--red),#f43f5e);border-radius:2px;transition:width .5s}

/* ── PODIUM ── */
#pod{background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.15);border-radius:11px;padding:11px 13px;margin-bottom:13px;display:none}
#pod.on{display:block}
.pi{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.3);border-radius:8px;padding:6px 10px;flex:1;min-width:110px}
.pi img{width:28px;height:40px;object-fit:cover;border-radius:4px;background:var(--bdr);flex-shrink:0}
.pn{color:#fff;font-size:10px;font-weight:700;line-height:1.3}
.ps{color:var(--gold);font-size:11px;font-weight:700;font-family:'Orbitron',sans-serif}

/* ── TABS ── */
#tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.tb{padding:5px 11px;background:transparent;border:1px solid var(--bdr);border-radius:6px;color:#6b7280;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.07em;font-family:'Rajdhani',sans-serif;transition:all .2s}
.tb.on{background:linear-gradient(90deg,var(--red),var(--rd));border-color:var(--red);color:#fff}
#srch-w{flex:1;min-width:100px;max-width:180px}
#srch{width:100%;background:#0d0d1a;border:1px solid var(--bdr);border-radius:6px;padding:5px 10px;color:#fff;font-size:11px;font-family:'Rajdhani',sans-serif;outline:none}
#srch:focus{border-color:var(--red)}
#srt-s{background:#0d0d1a;border:1px solid var(--bdr);border-radius:6px;padding:5px 9px;color:#6b7280;font-size:10px;font-family:'Rajdhani',sans-serif;outline:none}

/* ── GENRES ── */
#gen{display:flex;gap:4px;margin-bottom:11px;flex-wrap:wrap}
.gb{padding:3px 8px;background:transparent;border:1px solid var(--bdr);border-radius:20px;color:var(--mt);font-size:9px;cursor:pointer;font-family:'Rajdhani',sans-serif;transition:all .15s}
.gb.on{background:var(--bdr);border-color:#4b5563;color:#fff}
#ri{color:var(--sb);font-size:10px;letter-spacing:.06em;margin-bottom:9px}

/* ── GRID ── */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:9px}

/* ── CARD ── */
.card{background:linear-gradient(135deg,var(--c1),var(--c2));border:1px solid var(--bdr);border-radius:11px;overflow:hidden;transition:transform .2s,border-color .2s;position:relative}
.card.w{border-color:var(--red)}.card.r{border-color:var(--gold)}
.card:active{transform:scale(.97)}

/* ── IMAGE ── */
.ci{position:relative;width:100%;padding-top:143%;overflow:hidden;background:linear-gradient(135deg,#0a0a18,#14122a)}
.ci img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s}
.ci img.ok{opacity:1}
.ci .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;pointer-events:none}
.ci .ph .ic{font-size:24px;opacity:.18}
.ci .ph .bar{width:24px;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);border-radius:1px;animation:sh 1.4s infinite}
@keyframes sh{0%{transform:translateX(-200%)}100%{transform:translateX(500%)}}
.sb2{position:absolute;top:5px;right:5px;background:linear-gradient(135deg,#92400e,#d97706);border-radius:5px;padding:2px 6px;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;color:#fff;z-index:2}
.wb2{position:absolute;top:5px;left:5px;background:rgba(225,29,72,.88);border-radius:4px;padding:2px 5px;font-size:7px;font-weight:700;color:#fff;z-index:2}
/* edit pencil */
.ec{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,.7);border:none;border-radius:5px;color:#9ca3af;font-size:11px;cursor:pointer;padding:3px 6px;z-index:3;transition:color .2s;display:none}
.card:hover .ec{display:block}
.ec:hover{color:#fff}

/* ── CARD BODY ── */
.cb{padding:8px}
.ct{color:#fff;font-size:11px;font-weight:700;line-height:1.3;margin-bottom:2px}
.ca{color:var(--sb);font-size:8px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctg{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.tg{background:var(--bdr);color:#94a3b8;font-size:8px;padding:2px 4px;border-radius:3px}
.mr{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.mc{display:flex;align-items:center;gap:2px;font-size:8px}
.mc .v{color:var(--gold);font-weight:700}.mc .v.e{color:var(--sb)}
.ca-row{display:flex;gap:3px}
.bw{flex:1;padding:5px 0;background:linear-gradient(90deg,var(--red),var(--rd));border:none;border-radius:5px;color:#fff;font-size:9px;font-weight:700;cursor:pointer;letter-spacing:.05em;font-family:'Rajdhani',sans-serif}
.bw.on{background:transparent;border:1px solid var(--red);color:var(--red)}
.br{padding:4px 6px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:5px;color:var(--gold);font-size:9px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;white-space:nowrap}

/* ── LOAD MORE ── */
#lmw{text-align:center;margin-top:18px;display:none}
#lmb{padding:8px 26px;background:linear-gradient(90deg,var(--red),var(--rd));border:none;border-radius:8px;color:#fff;font-weight:700;font-size:12px;cursor:pointer;letter-spacing:.07em;font-family:'Rajdhani',sans-serif;box-shadow:0 3px 14px rgba(225,29,72,.4)}
#empty{text-align:center;padding:50px 0;color:var(--sb);display:none}
#empty.on{display:block}

/* ── MODALS ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:flex-start;justify-content:center;z-index:500;backdrop-filter:blur(6px);padding:16px;overflow-y:auto;padding-top:max(20px,env(safe-area-inset-top))}
.mo.on{display:flex}
.mb{background:linear-gradient(135deg,#0d0d1a,#1a1128);border:1px solid var(--red);border-radius:16px;padding:20px;width:100%;max-width:420px;font-family:'Rajdhani',sans-serif;margin:auto}
.ms{color:var(--red);font-size:9px;letter-spacing:.15em;margin-bottom:3px}
.mn{color:#fff;font-size:16px;font-weight:700;margin-bottom:14px;line-height:1.3}

/* global score */
.gs{background:rgba(225,29,72,.08);border:1px solid rgba(225,29,72,.2);border-radius:9px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.gsv{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:var(--gold)}

/* rating rows */
.rr{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.rrl{display:flex;align-items:center;gap:7px}
.st{font-size:20px;cursor:pointer;color:#2d3748;line-height:1;transition:color .1s,transform .1s;user-select:none}
.st.on{color:var(--gold)}.st:active{transform:scale(1.3)}
.rn{color:#6b7280;font-size:10px;width:16px;text-align:right}

/* form */
.fg{margin-bottom:11px}
.fl{color:#9ca3af;font-size:9px;letter-spacing:.1em;display:block;margin-bottom:4px}
.fi,.fsel{width:100%;background:#0d0d1a;border:1px solid var(--sb);border-radius:7px;padding:8px 11px;color:#fff;font-size:13px;font-family:'Rajdhani',sans-serif;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--red)}
textarea.fi{resize:vertical;min-height:60px}
.tgw{display:flex;align-items:center;gap:10px}
.tog{width:40px;height:22px;border-radius:11px;background:var(--sb);cursor:pointer;position:relative;transition:background .3s;flex-shrink:0}
.tog.on{background:var(--red)}
.tok{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .3s}
.tog.on .tok{left:21px}

/* image preview */
.img-prev{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:8px;margin-bottom:8px;display:none;background:var(--bdr)}
.img-prev.on{display:block}
.img-drop{border:2px dashed var(--sb);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:8px}
.img-drop:hover{border-color:var(--red)}
.img-drop p{color:var(--mt);font-size:11px}
.img-drop input{display:none}

/* action buttons */
.mac{display:flex;gap:8px;margin-top:16px}
.bc{flex:1;padding:10px;background:transparent;border:1px solid var(--sb);border-radius:7px;color:#9ca3af;cursor:pointer;font-size:12px;font-family:'Rajdhani',sans-serif}
.bsv{flex:2;padding:10px;background:linear-gradient(90deg,var(--red),var(--rd));border:none;border-radius:7px;color:#fff;font-weight:700;font-size:12px;cursor:pointer;letter-spacing:.07em;font-family:'Rajdhani',sans-serif;box-shadow:0 3px 12px rgba(225,29,72,.4)}
.bdel{padding:10px 12px;background:transparent;border:1px solid #dc2626;border-radius:7px;color:#dc2626;cursor:pointer;font-size:12px;font-family:'Rajdhani',sans-serif}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--sb);border-radius:2px}
</style>
</head>
<body>

<div id="hdr">
  <div class="logo"><span style="font-size:21px">⛩</span><h1>ANIME VAULT</h1></div>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="sv"><div class="n" id="s-tot" style="color:#94a3b8">0</div><div class="l">TOTAL</div></div>
    <div class="sv"><div class="n" id="s-w" style="color:var(--red)">0</div><div class="l">VUS</div></div>
    <div class="sv"><div class="n" id="s-r" style="color:var(--gold)">0</div><div class="l">NOTÉS</div></div>
    <div class="sv"><div class="n" id="s-u" style="color:#60a5fa">0</div><div class="l">À VOIR</div></div>
    <button id="add-btn" onclick="openAdd()">＋</button>
  </div>
</div>

<div id="main">
  <div class="pb-w">
    <div class="pb-l"><span style="color:var(--mt)">PROGRESSION</span><span style="color:var(--red)" id="pb-t">0%</span></div>
    <div class="pb"><div class="pb-f" id="pb-f" style="width:0%"></div></div>
  </div>
  <div id="pod"><div style="color:var(--gold);font-size:10px;letter-spacing:.13em;margin-bottom:8px">🏆 TON TOP NOTÉ</div><div id="pl" style="display:flex;gap:5px;flex-wrap:wrap"></div></div>
  <div id="tabs">
    <button class="tb on" onclick="setTab('all',this)">TOUS</button>
    <button class="tb" onclick="setTab('watched',this)">VUS</button>
    <button class="tb" onclick="setTab('unwatched',this)">À VOIR</button>
    <button class="tb" onclick="setTab('rated',this)">NOTÉS</button>
    <div id="srch-w"><input id="srch" placeholder="🔍 MHA, AoT…" oninput="onQ()" autocomplete="off" autocorrect="off" spellcheck="false"/></div>
    <select id="srt-s" onchange="onSrt()"><option value="title">A–Z</option><option value="year">ANNÉE</option><option value="rating">NOTE ↓</option></select>
  </div>
  <div id="gen"></div>
  <div id="ri"></div>
  <div id="grid"></div>
  <div id="empty"><div style="font-size:36px;margin-bottom:8px">⛩</div><p style="font-size:12px;letter-spacing:.1em">AUCUN ANIMÉ TROUVÉ</p></div>
  <div id="lmw"><button id="lmb" onclick="more()">CHARGER PLUS</button></div>
</div>

<!-- ══ RATING MODAL ══ -->
<div id="rm" class="mo" onclick="if(event.target===this)closeRM()">
  <div class="mb">
    <div class="ms">NOTATION DÉTAILLÉE</div>
    <div class="mn" id="rm-t"></div>
    <div class="gs"><span style="color:#9ca3af;font-size:11px;letter-spacing:.07em">SCORE GLOBAL</span><div style="display:flex;align-items:baseline;gap:5px"><span class="gsv" id="rm-g">—</span><span style="color:var(--mt);font-size:11px">/5</span></div></div>
    <div id="rm-c"></div>
    <div class="mac"><button class="bc" onclick="closeRM()">ANNULER</button><button class="bsv" onclick="saveR()">ENREGISTRER</button></div>
  </div>
</div>

<!-- ══ EDIT / ADD MODAL ══ -->
<div id="em" class="mo" onclick="if(event.target===this)closeEM()">
  <div class="mb">
    <div class="ms" id="em-sub">MODIFIER</div>
    <div class="mn" id="em-ttl">ANIMÉ</div>

    <!-- Image section -->
    <div class="fg">
      <label class="fl">IMAGE</label>
      <img id="em-prev" class="img-prev" alt="preview"/>
      <div class="img-drop" onclick="document.getElementById('em-file').click()">
        <p>📷 Clique pour choisir une image<br/><span style="font-size:9px;color:var(--sb)">ou colle une URL ci-dessous</span></p>
        <input type="file" id="em-file" accept="image/*" onchange="onImgFile(event)"/>
      </div>
      <input class="fi" id="em-url" placeholder="URL de l'image (optionnel)" oninput="onImgUrl()" style="margin-top:0"/>
    </div>

    <div class="fg"><label class="fl">TITRE</label><input class="fi" id="em-title" placeholder="Titre de l'animé…"/></div>
    <div class="fg"><label class="fl">ABRÉVIATIONS / ALIAS (séparés par virgule)</label><input class="fi" id="em-alias" placeholder="MHA, Boku no Hero, BnHA…"/></div>
    <div class="fg"><label class="fl">GENRE</label><select class="fsel" id="em-genre"></select></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fg"><label class="fl">ÉPISODES</label><input class="fi" id="em-ep" type="number" placeholder="24"/></div>
      <div class="fg"><label class="fl">ANNÉE</label><input class="fi" id="em-year" type="number" placeholder="2024"/></div>
    </div>
    <div class="fg">
      <div class="tgw">
        <span class="fl" style="margin-bottom:0">DÉJÀ VU</span>
        <div class="tog" id="em-tog" onclick="this.classList.toggle('on')"><div class="tok"></div></div>
      </div>
    </div>
    <div class="mac" id="em-btns">
      <button class="bc" onclick="closeEM()">ANNULER</button>
      <button class="bsv" id="em-save" onclick="saveEM()">ENREGISTRER</button>
    </div>
  </div>
</div>

const IC={};// image cache: id -> url (kitsu or custom base64)

async function getImg(id){
  if(IC[id])return IC[id];
  const slug=KS[id];
  if(!slug)return null;
  try{
    const r=await fetch(`https://kitsu.io/api/edge/anime?filter[slug]=${encodeURIComponent(slug)}&fields[anime]=posterImage`,
      {headers:{Accept:"application/vnd.api+json"}});
    const d=await r.json();
    const url=d?.data?.[0]?.attributes?.posterImage?.medium
           || d?.data?.[0]?.attributes?.posterImage?.small||null;
    if(url)IC[id]=url;
    return url;
  }catch{return null}
}

// De-duplicate by id (safety check)
// ══════════════════════════════════════════════
const seenIds=new Set();
const ANIMES_CLEAN=BASE.filter(a=>{if(seenIds.has(a.id))return false;seenIds.add(a.id);return true});
// De-duplicate by title
const seenTitles=new Set();
const ANIMES=ANIMES_CLEAN.filter(a=>{const k=a.t.toLowerCase().trim();if(seenTitles.has(k))return false;seenTitles.add(k);return true});

// STATE
// ══════════════════════════════════════════════
let A=[], ctab="all", cgen="Tous", csrt="title", cq="", cpg=1;
let rtgt=null, tR={};
let emTarget=null; // null = add mode, else = edit mode

function save(){
  try{localStorage.setItem(SK,JSON.stringify(A.map(a=>({id:a.id,w:a.w,rt:a.rt,img:a.img||null}))))}catch(e){}
}
function load(){
  try{
    const raw=localStorage.getItem(SK);
    if(raw){
      const sv=JSON.parse(raw);const sm={};sv.forEach(s=>sm[s.id]=s);
      A=ANIMES.map(b=>{const s=sm[b.id];return{...b,w:!!(s&&s.w),rt:(s&&s.rt)||{},img:(s&&s.img)||null}});
      sv.forEach(s=>{if(!ANIMES.find(b=>b.id===s.id))A.push({id:s.id,t:s.t||"?",al:s.al||[],g:s.g||"Shonen",ep:s.ep||0,y:s.y||null,w:!!s.w,rt:s.rt||{},img:s.img||null})});
      return;
    }
  }catch(e){}
  A=ANIMES.map(b=>({...b,w:false,rt:{},img:null}));
}

function sc(r){
  if(!r)return null;
  const v=RC.map(c=>r[c.key]).filter(x=>x>0);
  return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length*10)/10:null;
}

function buildGenres(){
  const w=document.getElementById("gen");
  GENRES.forEach(g=>{
    const b=document.createElement("button");
    b.className="gb"+(g==="Tous"?" on":"");b.textContent=g;
    b.onclick=()=>{cgen=g;document.querySelectorAll(".gb").forEach(x=>x.classList.remove("on"));b.classList.add("on");go()};
    w.appendChild(b);
  });
  const sel=document.getElementById("em-genre");
  GENRES.slice(1).forEach(g=>{const o=document.createElement("option");o.value=g;o.textContent=g;sel.appendChild(o)});
}

// ══════════════════════════════════════════════
// FILTER & SORT
// ══════════════════════════════════════════════
function filtered(){
  let l=[...A];
  if(ctab==="watched")   l=l.filter(a=>a.w);
  if(ctab==="unwatched") l=l.filter(a=>!a.w);
  if(ctab==="rated")     l=l.filter(a=>sc(a.rt)!==null);
  if(cgen!=="Tous")      l=l.filter(a=>a.g===cgen);
  if(cq){const lq=cq.toLowerCase();l=l.filter(a=>a.t.toLowerCase().includes(lq)||(a.al&&a.al.some(x=>x.toLowerCase().includes(lq))))}
  if(csrt==="title") l.sort((a,b)=>a.t.localeCompare(b.t));
  if(csrt==="year")  l.sort((a,b)=>(b.y||0)-(a.y||0));
  if(csrt==="rating")l.sort((a,b)=>(sc(b.rt)||0)-(sc(a.rt)||0));
  return l;
}

function stats(){
  const w=A.filter(a=>a.w).length,r=A.filter(a=>sc(a.rt)!==null).length;
  document.getElementById("s-tot").textContent=A.length;
  document.getElementById("s-w").textContent=w;
  document.getElementById("s-r").textContent=r;
  document.getElementById("s-u").textContent=A.length-w;
  const pct=A.length?Math.round(w/A.length*100):0;
  document.getElementById("pb-f").style.width=pct+"%";
  document.getElementById("pb-t").textContent=pct+"% · "+w+"/"+A.length;
  const top=[...A].filter(a=>sc(a.rt)!==null).sort((a,b)=>(sc(b.rt)||0)-(sc(a.rt)||0)).slice(0,3);
  const pod=document.getElementById("pod");
  if(top.length){
    pod.classList.add("on");
    document.getElementById("pl").innerHTML=top.map((a,i)=>`
      <div class="pi">
        <img src="${a.img||IC[a.id]||''}" alt="" onerror="this.style.display='none'" style="${(a.img||IC[a.id])?'':'display:none'}"/>
        <div><div class="pn">${a.t}</div><div class="ps">${sc(a.rt).toFixed(1)}</div></div>
        <span style="font-size:16px;margin-left:auto">${["🥇","🥈","🥉"][i]}</span>
      </div>`).join("");
  }else pod.classList.remove("on");
}

function cardHTML(a){
  const s=sc(a.rt),hr=s!==null;
  const imgSrc=a.img||IC[a.id]||"";
  const mini=a.w&&hr?`<div class="mr">${RC.map(c=>`<div class="mc"><span>${c.icon}</span><span class="v${a.rt[c.key]?'':' e'}">${a.rt[c.key]||'—'}</span></div>`).join("")}</div>`:"";
  return`<div class="card${a.w?(hr?" r":" w"):""}" id="c${a.id}">
    <div class="ci" id="ci${a.id}">
      <div class="ph"><span class="ic">⛩</span><div class="bar"></div></div>
      <img id="img${a.id}" alt="${a.t}" ${imgSrc?`src="${imgSrc}"`:''}
           onload="this.classList.add('ok')" onerror="this.remove()"
           ${imgSrc?'class="ok"':''}/>
      ${a.w?`<div class="wb2">✓ VU</div>`:""}
      ${hr?`<div class="sb2">${s.toFixed(1)}</div>`:""}
      <button class="ec" onclick="openEdit(${a.id})" title="Modifier">✏️</button>
    </div>
    <div class="cb">
      <div class="ct">${a.t}</div>
      ${a.al?.length?`<div class="ca">${a.al.slice(0,2).join(" · ")}</div>`:""}
      <div class="ctg">
        <span class="tg">${a.g}</span>
        ${a.y?`<span class="tg">${a.y}</span>`:""}
        ${a.ep>0?`<span class="tg">${a.ep===1?"Film":a.ep+" ép."}</span>`:""}
      </div>
      ${mini}
      <div class="ca-row">
        <button class="bw${a.w?" on":""}" onclick="tw(${a.id})">${a.w?"✓ VU":"MARQUER VU"}</button>
        ${a.w?`<button class="br" onclick="oR(${a.id})">⭐ NOTER</button>`:""}
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
// LAZY LOAD
// ══════════════════════════════════════════════
let obs;
function setupObs(){
  if(!('IntersectionObserver' in window))return;
  obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      const id=parseInt(e.target.dataset.id);if(!id)return;
      obs.unobserve(e.target);
      const a=A.find(x=>x.id===id);
      if(a&&a.img){const img=document.getElementById("img"+id);if(img){img.src=a.img;img.classList.add("ok")}return}
      getImg(id).then(url=>{
        if(!url)return;
        const img=document.getElementById("img"+id);
        if(img&&!img.src){img.src=url;img.classList.add("ok")}
      });
    });
  },{rootMargin:"300px"});
}
function observeAll(){
  if(!obs)return;
  document.querySelectorAll(".ci[data-id]").forEach(el=>obs.observe(el));
}

function render(){

  const grid=document.getElementById("grid"),em2=document.getElementById("empty"),lmw=document.getElementById("lmw");
  document.getElementById("ri").textContent=list.length+" animé"+(list.length>1?"s":"")+(list.length!==A.length?` (filtré${list.length>1?"s":""} sur ${A.length}`+")":"");
  if(!list.length){grid.innerHTML="";em2.classList.add("on");lmw.style.display="none"}
  else{
    em2.classList.remove("on");
    grid.innerHTML=vis.map(cardHTML).join("");
    vis.forEach(a=>{
      const el=document.getElementById("ci"+a.id);
      if(!el)return;
      el.dataset.id=a.id;
      if(a.img){const img=document.getElementById("img"+a.id);if(img){img.src=a.img;img.classList.add("ok")}}
      else if(IC[a.id]){const img=document.getElementById("img"+a.id);if(img){img.src=IC[a.id];img.classList.add("ok")}}
    });
    observeAll();
    if(vis.length<list.length){lmw.style.display="block";document.getElementById("lmb").textContent=`CHARGER PLUS (${list.length-vis.length} restants)`}
    else lmw.style.display="none";
  }
  stats();
}
function go(){cpg=1;render()}

// ══════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════
function tw(id){const a=A.find(x=>x.id===id);if(!a)return;a.w=!a.w;if(!a.w)a.rt={};save();go()}
function more(){cpg++;render()}
function setTab(t,el){ctab=t;document.querySelectorAll(".tb").forEach(b=>b.classList.remove("on"));el.classList.add("on");go()}
function onQ(){cq=document.getElementById("srch").value;go()}
function onSrt(){csrt=document.getElementById("srt-s").value;go()}

// ══════════════════════════════════════════════
// RATING MODAL
// ══════════════════════════════════════════════
function oR(id){
  const a=A.find(x=>x.id===id);if(!a)return;
  rtgt=a;tR={...(a.rt||{})};
  document.getElementById("rm-t").textContent=a.t;
  buildRC();updGS();
  document.getElementById("rm").classList.add("on");
}
function buildRC(){
  const w=document.getElementById("rm-c");w.innerHTML="";
  RC.forEach(cat=>{
    const row=document.createElement("div");row.className="rr";
    row.innerHTML=`<div class="rrl"><span style="font-size:15px">${cat.icon}</span><span style="color:#d1d5db;font-size:12px;font-weight:600;letter-spacing:.03em">${cat.label}</span></div><div style="display:flex;align-items:center;gap:7px"><div style="display:flex;gap:4px" id="sr-${cat.key}"></div><span class="rn" id="rn-${cat.key}">${tR[cat.key]||"—"}</span></div>`;
    w.appendChild(row);bSt(cat.key);
  });
}
function bSt(key){
  const w=document.getElementById("sr-"+key);if(!w)return;w.innerHTML="";
  for(let s=1;s<=5;s++){
    const sp=document.createElement("span");sp.className="st"+(s<=(tR[key]||0)?" on":"");sp.textContent="★";
    sp.onclick=()=>{tR[key]=(tR[key]===s)?0:s;bSt(key);document.getElementById("rn-"+key).textContent=tR[key]||"—";updGS()};
    w.appendChild(sp);
  }
}
function updGS(){const s=sc(tR);document.getElementById("rm-g").textContent=s!==null?s.toFixed(1):"—"}
function saveR(){if(!rtgt)return;rtgt.rt={...tR};save();closeRM();go()}
function closeRM(){document.getElementById("rm").classList.remove("on");rtgt=null}

// ══════════════════════════════════════════════
// EDIT / ADD MODAL
// ══════════════════════════════════════════════
let emImg=null; // pending base64 from file upload

function openAdd(){
  emTarget=null;emImg=null;
  document.getElementById("em-sub").textContent="NOUVEAU";
  document.getElementById("em-ttl").textContent="AJOUTER UN ANIMÉ";
  document.getElementById("em-title").value="";
  document.getElementById("em-alias").value="";
  document.getElementById("em-genre").value="Shonen";
  document.getElementById("em-ep").value="";
  document.getElementById("em-year").value="";
  document.getElementById("em-tog").classList.remove("on");
  document.getElementById("em-url").value="";
  document.getElementById("em-prev").className="img-prev";
  // show delete btn? No for add
  const btns=document.getElementById("em-btns");
  btns.innerHTML=`<button class="bc" onclick="closeEM()">ANNULER</button><button class="bsv" id="em-save" onclick="saveEM()">AJOUTER</button>`;
  document.getElementById("em").classList.add("on");
}

function openEdit(id){
  const a=A.find(x=>x.id===id);if(!a)return;
  emTarget=a;emImg=null;
  document.getElementById("em-sub").textContent="MODIFIER";
  document.getElementById("em-ttl").textContent=a.t;
  document.getElementById("em-title").value=a.t;
  document.getElementById("em-alias").value=(a.al||[]).join(", ");
  document.getElementById("em-genre").value=a.g;
  document.getElementById("em-ep").value=a.ep||"";
  document.getElementById("em-year").value=a.y||"";
  if(a.w)document.getElementById("em-tog").classList.add("on");
  else document.getElementById("em-tog").classList.remove("on");
  const imgSrc=a.img||IC[a.id]||"";
  document.getElementById("em-url").value=imgSrc.startsWith("data:")?"":(imgSrc||"");
  const prev=document.getElementById("em-prev");
  if(imgSrc){prev.src=imgSrc;prev.className="img-prev on"}else{prev.className="img-prev"}
  const btns=document.getElementById("em-btns");
  btns.innerHTML=`<button class="bdel" onclick="delAnime(${id})">🗑 SUPPRIMER</button><button class="bc" onclick="closeEM()">ANNULER</button><button class="bsv" onclick="saveEM()">ENREGISTRER</button>`;
  document.getElementById("em").classList.add("on");
}

function onImgFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    emImg=ev.target.result;
    const prev=document.getElementById("em-prev");
    prev.src=emImg;prev.className="img-prev on";
    document.getElementById("em-url").value="";
  };
  reader.readAsDataURL(file);
}
function onImgUrl(){
  const url=document.getElementById("em-url").value.trim();
  if(!url){document.getElementById("em-prev").className="img-prev";emImg=null;return}
  emImg=null;
  const prev=document.getElementById("em-prev");
  prev.src=url;prev.className="img-prev on";
}

function saveEM(){
  const title=document.getElementById("em-title").value.trim();
  if(!title)return;
  const aliases=document.getElementById("em-alias").value.split(",").map(s=>s.trim()).filter(Boolean);
  const genre=document.getElementById("em-genre").value;
  const ep=parseInt(document.getElementById("em-ep").value)||0;
  const year=parseInt(document.getElementById("em-year").value)||null;
  const watched=document.getElementById("em-tog").classList.contains("on");
  let imgFinal=emImg||null;
  if(!imgFinal){const url=document.getElementById("em-url").value.trim();if(url)imgFinal=url;}

  if(emTarget){
    // edit existing
    emTarget.t=title;emTarget.al=aliases;emTarget.g=genre;emTarget.ep=ep;emTarget.y=year;
    emTarget.w=watched;if(!watched)emTarget.rt={};
    if(imgFinal)emTarget.img=imgFinal;
    else if(imgFinal===null&&document.getElementById("em-url").value.trim()===""){}// keep existing if url empty and no file
  }else{
    // add new
    A.push({id:Date.now(),t:title,al:aliases,g:genre,ep,y:year,w:watched,rt:{},img:imgFinal});
  }
  save();closeEM();go();
}

function delAnime(id){
  if(!confirm("Supprimer cet animé ?"))return;
  A=A.filter(x=>x.id!==id);save();closeEM();go();
}
function closeEM(){document.getElementById("em").classList.remove("on");emTarget=null;emImg=null}

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════
load();buildGenres();setupObs();go();
</script>
